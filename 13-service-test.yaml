
apiVersion: v1
kind: Pod
metadata:
 name: servicetest
spec:
 containers:
 - name: almalinux
   image: almalinux
   command: ["sleep","1000"]



# For bidirectional communication, each component that needs to be accessed 
# should be exposed via its own Service, enabling stable DNS-based access.

# One-line takeaway
# “If it needs to be called → it needs a Service.”

# You don’t manually create DNS records in Kubernetes
# They are auto-generated from Services

# DNS records in Kubernetes are maintained by CoreDNS inside the cluster

# Where are records stored?
# 👉 Not like traditional DNS (no zone files you manage)
# They are:
# Dynamically generated
# Stored in Kubernetes API (etcd)
# Served by CoreDNS
# Pod A → DNS query → CoreDNS → returns ClusterIP → Service → Pod B
# Test inside cluster
# kubectl exec -it frontend -- nslookup backend-service

# 👉 Output shows:

# ClusterIP
# DNS resolution working